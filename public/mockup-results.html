      <div>
        <div class="flex items-start justify-between gap-2">
          <div>
            <h3 class="font-semibold text-gray-900 group-hover:text-pink-700 transition-colors text-base leading-tight">${v.name}</h3>
            <p class="text-gray-400 text-xs mt-0.5">${v.city}, ${v.state} · ${v.type}</p>
          </div>
          <button class="heart-btn flex-shrink-0 text-gray-300 hover:text-pink-500 transition-colors mt-0.5" onclick="event.stopPropagation(); toggleHeart(this)" title="Save to Favorites">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          </button>
        </div>
        <div class="flex flex-wrap gap-1 mt-2">${tagHtml}</div>
        <p class="text-gray-500 text-sm mt-2 line-clamp-2">${v.desc}</p>
      </div>
      <div class="flex flex-wrap items-center gap-3 mt-3">
        ${starsHtml(v.rating)} <span class="text-gray-400 text-xs">(${v.reviews} reviews)</span>
        <span class="text-gray-300">·</span>
        <span class="text-xs text-gray-500">👥 ${v.capacity} guests</span>
        <span class="text-gray-300 hidden sm:inline">·</span>
        <div class="hidden sm:flex flex-wrap gap-2">${amenityHtml}</div>
      </div>
    </div>
    <!-- Price -->
    <div class="flex-shrink-0 text-right hidden sm:block">
      <p class="font-bold text-pink-700 text-lg">$${v.price.toLocaleString()}</p>
      <p class="text-gray-400 text-xs">venue rental</p>
    </div>
  </div>`;
}

function skeletonCard() {
  return `<div class="bg-white rounded-2xl border border-gray-100 p-4 flex gap-4">
    <div class="skeleton flex-shrink-0 w-44 h-36 rounded-lg"></div>
    <div class="flex-1 space-y-3 pt-1">
      <div class="skeleton h-4 rounded w-2/3"></div>
      <div class="skeleton h-3 rounded w-1/3"></div>
      <div class="skeleton h-3 rounded w-full"></div>
      <div class="skeleton h-3 rounded w-4/5"></div>
    </div>
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────────────
function renderVenues(list) {
  const el = document.getElementById('venue-list');
  el.innerHTML = list.map((v, i) => renderCard(v, i)).join('');
}

renderVenues(venues);

// ─── LOAD MORE ───────────────────────────────────────────────────
let loaded = false;
function loadMore() {
  if (loaded) return;
  loaded = true;
  const list = document.getElementById('venue-list');
  const btn = document.getElementById('load-more-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  // Show skeletons
  const skels = document.createElement('div');
  skels.id = 'skeletons';
  skels.className = 'space-y-4 mt-4';
  skels.innerHTML = skeletonCard() + skeletonCard() + skeletonCard();
  list.appendChild(skels);
  setTimeout(() => {
    skels.remove();
    extraVenues.forEach(v => {
      const div = document.createElement('div');
      div.innerHTML = renderCard(v);
      list.appendChild(div.firstElementChild);
    });
    document.getElementById('showing-count').textContent = '13';
    btn.textContent = 'All venues loaded';
    btn.classList.add('opacity-50', 'cursor-not-allowed');
  }, 900);
}

// ─── FILTER TOGGLE ───────────────────────────────────────────────
function toggleSection(btn) {
  const content = btn.nextElementSibling;
  const chevron = btn.querySelector('.chevron');
  content.classList.toggle('collapsed');
  chevron.classList.toggle('rotated');
}

// ─── PILL FILTER ─────────────────────────────────────────────────
function togglePill(btn) {
  btn.classList.toggle('active');
}

// ─── HEART ───────────────────────────────────────────────────────
function toggleHeart(btn) {
  const svg = btn.querySelector('svg');
  if (svg.getAttribute('fill') === 'none') {
    svg.setAttribute('fill', '#db2777');
    svg.setAttribute('stroke', '#db2777');
    btn.classList.add('text-pink-500');
  } else {
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    btn.classList.remove('text-pink-500');
  }
}

// ─── CAPACITY LABEL ──────────────────────────────────────────────
let capMin = 50, capMax = 250;
function updateCapacity(val, which) {
  if (which === 'min') capMin = parseInt(val);
  else capMax = parseInt(val);
  document.getElementById('capacity-label').textContent = `${capMin} – ${capMax} guests`;
}

let priceMin = 5000, priceMax = 20000;
function updatePrice(val, which) {
  if (which === 'min') priceMin = parseInt(val);
  else priceMax = parseInt(val);
  document.getElementById('price-label').textContent = `$${priceMin.toLocaleString()} – $${priceMax.toLocaleString()}`;
}

// ─── MOBILE FILTERS ──────────────────────────────────────────────
function openMobileFilters() {
  const panel = document.getElementById('mobile-filter-panel');
  const overlay = document.getElementById('filter-overlay');
  const sidebar = document.querySelector('aside').innerHTML;
  document.getElementById('mobile-filter-content').innerHTML = sidebar;
  panel.classList.add('open');
  overlay.classList.remove('hidden');
}
function closeMobileFilters() {
  document.getElementById('mobile-filter-panel').classList.remove('open');
  document.getElementById('filter-overlay').classList.add('hidden');
}

// ─── LUCIDE ──────────────────────────────────────────────────────
lucide.createIcons();
</script>
</body>
</html>
